schema: xgc2.product.v1
id: xgc2-camera-ros1
name: XGC2 ROS1 Camera Driver
version: 0.3.0-2
kind: ros1-apt
summary: ROS Noetic adapter for the independently released XGC2 Linux camera core.
ros:
  distro: noetic
  workspace: catkin
  packages:
  - xgc_camera_driver
apt:
  distribution: focal
  install:
  - ros-noetic-xgc-camera-driver
  packages:
  - ros-noetic-xgc-camera-driver
  package_architectures:
    ros-noetic-xgc-camera-driver:
    - amd64
    - arm64
  depends:
  - libavcodec58
  - libavutil56
  - libopencv-core4.2
  - libopencv-imgcodecs4.2
  - libopencv-imgproc4.2
  - libswscale5
  - libxgc2-camera-dev (>= 0.1.0-1~focal)
  - ros-noetic-camera-info-manager
  - ros-noetic-cv-bridge
  - ros-noetic-diagnostic-msgs
  - ros-noetic-diagnostic-updater
  - ros-noetic-image-transport
  - ros-noetic-roscpp
  - ros-noetic-roslaunch
  - ros-noetic-rostopic
  - ros-noetic-sensor-msgs
usage:
  install: |
    sudo apt update
    sudo apt install ros-noetic-xgc-camera-driver
  smoke_test: |
    roslaunch xgc_camera_driver camera.launch backend:=synthetic pixel_format:=bgr24
    rostopic echo -n 1 /usb_cam/camera_info
  notes: |
    One process owns one camera and publishes synchronized Image and CameraInfo
    messages plus diagnostics. Calibration tools are released independently by
    the xgc2-camera-calibration-ros1 product.
ownership:
  paths:
  - /opt/ros/noetic/share/xgc_camera_driver
  - /opt/ros/noetic/lib/xgc_camera_driver
  - /usr/share/xgc2/process-definitions/xgc2-camera-driver-ros1.json
release:
  requires:
  - libxgc2-camera-dev
  dependency_policy:
    libxgc2-camera-dev: rebuild
  repository: lxk36/xgc2-camera-ros1
  ref: main
  workflow: release.yml
  ci_workflow: ci.yml
  apt_versions:
    focal: 0.3.0-2
